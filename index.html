<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLM Predictor</title>
    <!-- Tailwind CSS for trendy styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            400: '#4ade80', // Emerald green
                            500: '#10b981', 
                            600: '#059669', 
                            accent: '#f59e0b', // Amber
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Marked for safely rendering the AI's markdown response -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Import Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.08), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(245, 158, 11, 0.08), transparent 50%);
            background-attachment: fixed;
        }
        .glass-panel { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .bio-card {
            background: linear-gradient(to bottom right, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95));
            border-top: 2px solid #10b981;
        }
        
        /* Styling the Markdown output */
        .prose h1, .prose h2, .prose h3 { color: #f8fafc; margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 700; }
        .prose h2 { font-size: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .prose p { margin-bottom: 1em; line-height: 1.7; color: #cbd5e1; }
        .prose ul { list-style-type: none; padding-left: 0; margin-bottom: 1em; }
        .prose ul li { position: relative; padding-left: 1.5rem; margin-bottom: 0.5rem; color: #cbd5e1;}
        .prose ul li::before { content: "▹"; position: absolute; left: 0; top: 0px; font-size: 1.2em; color: #10b981; }
        .prose strong { color: #4ade80; font-weight: 600; }
        .prose code { background: rgba(0,0,0,0.4); padding: 0.2rem 0.4rem; border-radius: 0.25rem; color: #e2e8f0; font-family: monospace; border: 1px solid rgba(255,255,255,0.1); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .hashtag:hover {
            color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
            transform: translateY(-1px);
        }
        
        /* Fix native datalist arrow appearance slightly */
        input::-webkit-calendar-picker-indicator {
            opacity: 0.5;
            cursor: pointer;
            filter: invert(1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            // State to handle which input mode the user prefers
            const [inputMode, setInputMode] = useState('manual'); // 'manual' or 'device'

            // State for the API Key required for GitHub pages
            const [customApiKey, setCustomApiKey] = useState('');

            // State for manual specifications
            const [specs, setSpecs] = useState({
                os: 'macOS',
                cpu: 'Apple M1 Max',
                ram: '32GB',
                gpu: 'Apple Unified Memory (M-Series)'
            });

            // State for specific device model entry
            const [deviceInfo, setDeviceInfo] = useState({
                brand: '',
                model: '',
                extraSpecs: ''
            });

            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState('');
            const [error, setError] = useState('');

            const fetchAIPrediction = async (promptText) => {
                const apiKey = customApiKey.trim() || ""; 
                
                // If a user provides an API key (like on GitHub pages), we use the stable 1.5-flash model.
                // If no key is provided (like in the Canvas preview here), it defaults to the preview model.
                const modelName = apiKey ? "gemini-1.5-flash" : "gemini-2.5-flash-preview-09-2025";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                
                const systemPrompt = "You are an expert AI hardware consultant. Your goal is to analyze computer specs, point out technical advantages/bottlenecks for running local LLMs, and recommend the top 3 best local AI models that will run smoothly on their specific machine. Use a trendy, enthusiastic, and highly technical tone. Format the response nicely using Markdown.";
                
                const payload = {
                    contents: [{ parts: [{ text: systemPrompt + "\n\nUser Hardware Specs:\n" + promptText }] }]
                };

                let attempt = 0;
                const maxRetries = 5;
                const delays = [1000, 2000, 4000, 8000, 16000];

                while (attempt < maxRetries) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            const errorText = await response.text();
                            console.error("API Error Response:", errorText);
                            if (response.status === 400 && errorText.includes("API key not valid")) {
                                throw new Error("Invalid API Key: Please check the API key you entered and try again.");
                            }
                            if (response.status === 403 || response.status === 401) {
                                throw new Error("Access Denied: Please provide a valid Gemini API Key in the field to use this tool.");
                            }
                            throw new Error(`HTTP error! status: ${response.status} - ${errorText.substring(0, 50)}...`);
                        }
                        
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "No prediction generated.";
                    } catch (err) {
                        console.error(`Attempt ${attempt + 1} failed:`, err);
                        
                        // Don't retry if it's an API key error, fail immediately so the user knows
                        if (err.message.includes("Access Denied") || err.message.includes("Invalid API Key")) {
                            throw err;
                        }

                        attempt++;
                        if (attempt >= maxRetries) {
                            throw new Error(err.message || "Unable to connect to the AI model. Please try again later.");
                        }
                        await new Promise(resolve => setTimeout(resolve, delays[attempt - 1]));
                    }
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                // Require an API key if not running in the Canvas environment (we can loosely check this if customApiKey is empty but they hit submit)
                // We will let the API call handle the empty key rejection for exact accuracy.

                setLoading(true);
                setError('');
                setResult('');

                let prompt = "";

                if (inputMode === 'device') {
                    if (!deviceInfo.brand || !deviceInfo.model) {
                        setError("Please enter at least the brand and model of your device.");
                        setLoading(false);
                        return;
                    }
                    prompt = `Analyze this specific computer model for running Local LLMs:
                    Brand: ${deviceInfo.brand}
                    Model/Series: ${deviceInfo.model}
                    Additional Known Specs (if any): ${deviceInfo.extraSpecs || 'None provided. Please infer typical baseline specs for this model.'}
                    
                    Please provide:
                    1. A brief "AI Magic" analysis: What do these specific model specs mean for AI? 
                    2. Recommendations: The top 3 local LLMs (like Llama 3, Mistral, etc.) that are the absolute best fit for this machine.
                    3. Expected Performance: What tokens/second or general speed they can expect.
                    4. Recommended Software: What app should they use to run it?`;
                } else {
                    prompt = `Analyze these computer specs for running Local LLMs:
                    OS: ${specs.os}
                    CPU: ${specs.cpu}
                    RAM: ${specs.ram}
                    GPU: ${specs.gpu}
                    
                    Please provide:
                    1. A brief "AI Magic" analysis: What do these specs mean for AI? (e.g., mention how unified memory works if it's a Mac).
                    2. Recommendations: The top 3 local LLMs (like Llama 3, Mistral, etc.) that are the absolute best fit for this machine.
                    3. Expected Performance: What tokens/second or general speed they can expect.
                    4. Recommended Software: What app should they use to run it? (e.g., LM Studio, Ollama).`;
                }

                try {
                    const aiResponse = await fetchAIPrediction(prompt);
                    setResult(aiResponse);
                } catch (err) {
                    setError(err.message || "Oops! The AI prediction failed. Please try again.");
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const handleManualChange = (e) => {
                setSpecs({ ...specs, [e.target.name]: e.target.value });
            };

            const handleDeviceChange = (e) => {
                setDeviceInfo({ ...deviceInfo, [e.target.name]: e.target.value });
            };

            const hashtags = [
                "#Python", "#MachineLearning", "#Cybersecurity", "#TB_Research", 
                "#Poetry", "#Farming", "#EdTech", "#SocialInnovation", 
                "#EthicalHacking", "#PublicSpeaking", "#Mentorship", "#OpenSource", 
                "#Rajasthan", "#PhD_Life", "#TechForGood", "#CloudComputing", 
                "#Automation", "#Storytelling"
            ];

            return (
                <div className="min-h-screen py-16 px-4 sm:px-6 lg:px-8 flex flex-col items-center selection:bg-brand-500 selection:text-white">
                    
                    {/* Header Section */}
                    <div className="text-center max-w-3xl mb-12">
                        <div className="inline-block mb-4 px-3 py-1 rounded-full border border-brand-500/30 bg-brand-500/10 text-brand-400 text-sm font-medium tracking-wide">
                            AI Hardware Analysis Tool
                        </div>
                        <h1 className="text-5xl font-extrabold tracking-tight mb-6 text-white">
                            Local LLM <span className="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-brand-accent">Predictor</span>
                        </h1>
                        <p className="text-lg text-slate-400 font-light leading-relaxed">
                            Discover the perfect offline AI models for your specific hardware. No cloud required, just raw local compute power.
                        </p>
                    </div>

                    <div className="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8 mb-16">
                        
                        {/* Input Form Column */}
                        <div className="lg:col-span-5">
                            <div className="glass-panel rounded-2xl p-8 h-full">
                                <h2 className="text-2xl font-bold mb-6 flex items-center text-white border-b border-slate-700/50 pb-4">
                                    <svg className="w-6 h-6 mr-3 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                                    System Specifications
                                </h2>

                                {/* Input Mode Toggle */}
                                <div className="flex bg-slate-800/60 p-1.5 rounded-xl mb-8 border border-slate-700/50">
                                    <button 
                                        type="button"
                                        onClick={() => setInputMode('manual')} 
                                        className={`flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 ${inputMode === 'manual' ? 'bg-brand-500 text-white shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/30'}`}
                                    >
                                        Manual Specs
                                    </button>
                                    <button 
                                        type="button"
                                        onClick={() => setInputMode('device')} 
                                        className={`flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 ${inputMode === 'device' ? 'bg-brand-500 text-white shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/30'}`}
                                    >
                                        Device Model (Auto)
                                    </button>
                                </div>
                                
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    
                                    {/* --- MODE: DEVICE MODEL --- */}
                                    {inputMode === 'device' && (
                                        <div className="space-y-6 animate-[fadeIn_0.3s_ease-in-out]">
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">Device Brand</label>
                                                <input 
                                                    type="text" 
                                                    name="brand" 
                                                    value={deviceInfo.brand} 
                                                    onChange={handleDeviceChange} 
                                                    placeholder="e.g., Lenovo, Apple, Dell, Asus"
                                                    className="w-full bg-slate-800/80 border border-slate-600 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition shadow-inner placeholder-slate-500"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">Model / Series Number</label>
                                                <input 
                                                    type="text" 
                                                    name="model" 
                                                    value={deviceInfo.model} 
                                                    onChange={handleDeviceChange} 
                                                    placeholder="e.g., Legion Pro 5i, MacBook Pro 16 M3 Max"
                                                    className="w-full bg-slate-800/80 border border-slate-600 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition shadow-inner placeholder-slate-500"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">Any Known Specs? <span className="text-slate-500 font-normal">(Optional)</span></label>
                                                <input 
                                                    type="text" 
                                                    name="extraSpecs" 
                                                    value={deviceInfo.extraSpecs} 
                                                    onChange={handleDeviceChange} 
                                                    placeholder="e.g., 64GB RAM, RTX 4070, or leave blank"
                                                    className="w-full bg-slate-800/80 border border-slate-600 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition shadow-inner placeholder-slate-500"
                                                />
                                            </div>
                                        </div>
                                    )}

                                    {/* --- MODE: MANUAL SPECS --- */}
                                    {inputMode === 'manual' && (
                                        <div className="space-y-6 animate-[fadeIn_0.3s_ease-in-out]">
                                            {/* OS Input with Datalist */}
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">Operating System</label>
                                                <input 
                                                    type="text" 
                                                    list="os-options" 
                                                    name="os" 
                                                    value={specs.os} 
                                                    onChange={handleManualChange} 
                                                    placeholder="Select from list or type your own..."
                                                    className="w-full bg-slate-800/80 border border-slate-600 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition shadow-inner"
                                                />
                                                <datalist id="os-options">
                                                    <option value="macOS" />
                                                    <option value="Windows 11" />
                                                    <option value="Windows 10" />
                                                    <option value="Ubuntu Linux" />
                                                    <option value="Debian Linux" />
                                                    <option value="Arch Linux" />
                                                    <option value="Pop!_OS" />
                                                </datalist>
                                            </div>

                                            {/* CPU Input with Datalist */}
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">Processor (CPU)</label>
                                                <input 
                                                    type="text" 
                                                    list="cpu-options" 
                                                    name="cpu" 
                                                    value={specs.cpu} 
                                                    onChange={handleManualChange} 
                                                    placeholder="Select from list or type exact model..."
                                                    className="w-full bg-slate-800/80 border border-slate-600 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition shadow-inner"
                                                />
                                                <datalist id="cpu-options">
                                                    <option value="Apple M1/M2/M3 (Base)" />
                                                    <option value="Apple M1/M2/M3 Pro" />
                                                    <option value="Apple M1/M2/M3 Max" />
                                                    <option value="Apple M1/M2 Ultra" />
                                                    <option value="Apple M4 (iPad Pro/Mac)" />
                                                    <option value="Intel Core i5 (12th-14th Gen)" />
                                                    <option value="Intel Core i7 (12th-14th Gen)" />
                                                    <option value="Intel Core i9 (12th-14th Gen)" />
                                                    <option value="Intel Core Ultra 5 / 7 / 9" />
                                                    <option value="AMD Ryzen 5 (5000/7000/8000 Series)" />
                                                    <option value="AMD Ryzen 7 (5000/7000/8000 Series)" />
                                                    <option value="AMD Ryzen 9 (5000/7000/8000 Series)" />
                                                    <option value="AMD Threadripper Pro" />
                                                    <option value="Qualcomm Snapdragon X Elite" />
                                                </datalist>
                                            </div>

                                            {/* RAM Input with Datalist */}
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">System Memory (RAM)</label>
                                                <input 
                                                    type="text" 
                                                    list="ram-options" 
                                                    name="ram" 
                                                    value={specs.ram} 
                                                    onChange={handleManualChange} 
                                                    placeholder="Select from list or type capacity..."
                                                    className="w-full bg-slate-800/80 border border-slate-600 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition shadow-inner"
                                                />
                                                <datalist id="ram-options">
                                                    <option value="8GB" />
                                                    <option value="12GB" />
                                                    <option value="16GB" />
                                                    <option value="24GB" />
                                                    <option value="32GB" />
                                                    <option value="48GB" />
                                                    <option value="64GB" />
                                                    <option value="96GB" />
                                                    <option value="128GB" />
                                                    <option value="192GB" />
                                                    <option value="256GB+" />
                                                </datalist>
                                            </div>

                                            {/* GPU Input with Datalist */}
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">Graphics Card (GPU)</label>
                                                <input 
                                                    type="text" 
                                                    list="gpu-options" 
                                                    name="gpu" 
                                                    value={specs.gpu} 
                                                    onChange={handleManualChange} 
                                                    placeholder="Select from list or type exact model..."
                                                    className="w-full bg-slate-800/80 border border-slate-600 rounded-xl py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition shadow-inner"
                                                />
                                                <datalist id="gpu-options">
                                                    <option value="Apple Unified Memory (M-Series Built-in)" />
                                                    <option value="Intel Arc Graphics (Integrated)" />
                                                    <option value="AMD Radeon 780M (Integrated)" />
                                                    <option value="NVIDIA RTX 3050 / 4050 (4-6GB VRAM)" />
                                                    <option value="NVIDIA RTX 3060 / 4060 (8GB VRAM)" />
                                                    <option value="NVIDIA RTX 3070 / 4070 (8-12GB VRAM)" />
                                                    <option value="NVIDIA RTX 3080 / 4080 (10-16GB VRAM)" />
                                                    <option value="NVIDIA RTX 3090 / 4090 (24GB VRAM)" />
                                                    <option value="NVIDIA RTX A6000 / Ada (48GB VRAM)" />
                                                    <option value="AMD Radeon RX 6600 / 7600 (8GB)" />
                                                    <option value="AMD Radeon RX 6700 / 7700 (12GB)" />
                                                    <option value="AMD Radeon RX 6800 / 7800 (16GB)" />
                                                    <option value="AMD Radeon RX 6900 / 7900 XTX (24GB)" />
                                                </datalist>
                                            </div>
                                        </div>
                                    )}

                                    <div className="pt-4 border-t border-slate-700/50 mt-6">
                                        <label className="block text-sm font-medium text-slate-300 mb-2">
                                            Gemini API Key 
                                            <span className="text-brand-400 text-xs ml-2 font-normal px-2 py-0.5 bg-brand-400/10 rounded">Required for GitHub Pages</span>
                                        </label>
                                        <div className="relative">
                                            <input 
                                                type="password" 
                                                name="customApiKey" 
                                                value={customApiKey} 
                                                onChange={(e) => setCustomApiKey(e.target.value)} 
                                                placeholder="Paste your API key here..."
                                                className="w-full bg-slate-900/80 border border-slate-600 rounded-xl py-3 px-4 pl-10 text-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition shadow-inner placeholder-slate-600 text-sm"
                                            />
                                            <svg className="w-5 h-5 text-slate-500 absolute left-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                                        </div>
                                        <p className="text-xs text-slate-500 mt-2">
                                            Get a free API key from <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-brand-400 hover:underline">Google AI Studio</a> to use this app.
                                        </p>
                                    </div>

                                    <button 
                                        type="submit" 
                                        disabled={loading}
                                        className={`w-full mt-8 py-4 px-4 rounded-xl font-bold text-slate-900 text-lg transition-all duration-300 transform hover:-translate-y-1 ${loading ? 'bg-slate-600 text-slate-300 cursor-not-allowed' : 'bg-brand-400 hover:bg-brand-500 shadow-[0_0_20px_rgba(16,185,129,0.3)] hover:shadow-[0_0_25px_rgba(16,185,129,0.5)]'}`}
                                    >
                                        {loading ? (
                                            <span className="flex items-center justify-center">
                                                <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-slate-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                                Analyzing Hardware...
                                            </span>
                                        ) : 'Generate Prediction'}
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* Results Column */}
                        <div className="lg:col-span-7 mt-8 lg:mt-0">
                            <div className="glass-panel rounded-2xl p-8 h-full min-h-[500px] flex flex-col relative overflow-hidden">
                                
                                {!result && !loading && !error && (
                                    <div className="flex-grow flex flex-col items-center justify-center text-center opacity-60">
                                        <div className="p-6 bg-slate-800/50 rounded-full mb-6 border border-slate-700">
                                            <svg className="w-16 h-16 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                        </div>
                                        <h3 className="text-2xl font-medium text-white mb-3">Ready for Analysis</h3>
                                        <p className="text-slate-400 max-w-md font-light">Choose your input method on the left and generate a tailored report of the best offline AI models your machine can handle.</p>

                                            View Portfolio
                                        </a>
                                    </div>
                                </div>

                                {/* Right Column: Bio & Mission */}
                                <div className="col-span-1 md:col-span-2 flex flex-col justify-center">
                                    <div className="font-serif text-slate-300 text-base leading-relaxed space-y-4">
                                        <p>
                                            I operate at the intersection of conflicting worlds. By day, I am an <strong className="text-white font-sans">Assistant Professor</strong> guiding BCA & BTech students to break and rebuild technology, refusing to be boring in a lecture hall. By night, I transform into a researcher, applying <strong className="text-white font-sans">AI/ML for Tuberculosis Diagnosis</strong> because I believe code should save lives, not just crunch numbers.
                                        </p>
                                        <p className="italic border-l-2 border-brand-500 pl-4 py-1 text-slate-400">

                                        </p>
                                        <p>
                                            I don't just teach syntax; I teach survival in the digital age. From designing industry-ready curricula to leading social-impact startups like <span className="text-brand-400 font-semibold font-sans">Aquantrix</span>, I bridge the gap between silicon chips and soil, ensuring that innovation reaches the last mile.
